<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profile | AquaTrack Rwanda</title>

    <link rel="stylesheet" href="citizen.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://kit.fontawesome.com/8ddda2c5e4.js" crossorigin="anonymous"></script>
</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            <i class="fa-solid fa-droplet"></i>

            <div>

                <h2>AquaTrack</h2>

                <span>Citizen Portal</span>

            </div>

        </div>

        <ul>

            <li>

                <a href="citizen-dashboard.html">

                    <i class="fa-solid fa-house"></i>

                    Dashboard

                </a>

            </li>

            <li>

                <a href="citizen-history.html">

                    <i class="fa-solid fa-clock-rotate-left"></i>

                    History

                </a>

            </li>

            <li>

                <a href="citizen-report.html">

                    <i class="fa-solid fa-file-circle-plus"></i>

                    Report Issue

                </a>

            </li>

            <li class="active">

                <a href="citizen-profile.html">

                    <i class="fa-solid fa-user"></i>

                    Profile

                </a>

            </li>

            <li>

                <a href="index.html">

                    <i class="fa-solid fa-right-from-bracket"></i>

                    Logout

                </a>

            </li>

        </ul>

    </aside>

    <!-- Main Content -->

    <main class="content">

        <header class="topbar">

            <div>

                <h1>My Profile</h1>

                <p>Manage your AquaTrack account information.</p>

            </div>

        </header>

        <section class="table-card">

            <div style="text-align:center;margin-bottom:30px;">

                <img src="images/profile.png"
                     alt="Profile"
                     style="width:120px;height:120px;border-radius:50%;object-fit:cover;">

                <h2 style="margin-top:15px;">John Doe</h2>

                <p style="color:#64748B;">Citizen Account</p>

            </div>

            <form>

                <div class="input-group">

                    <label>Full Name</label>

                    <div class="input-box">

                        <i class="fa-solid fa-user"></i>

                        <input type="text" value="John Doe">

                    </div>

                </div>

                <div class="input-group">

                    <label>Email Address</label>

                    <div class="input-box">

                        <i class="fa-solid fa-envelope"></i>

                        <input type="email" value="john@email.com">

                    </div>

                </div>

                <div class="input-group">

                    <label>Phone Number</label>

                    <div class="input-box">

                        <i class="fa-solid fa-phone"></i>

                        <input type="text" value="+250 788 123 456">

                    </div>

                </div>

                <div class="input-group">

                    <label>District</label>

                    <div class="input-box">

                        <i class="fa-solid fa-location-dot"></i>

                        <input type="text" value="Gasabo">

                    </div>

                </div>

                <button class="login-btn">

                    Save Changes

                </button>

            </form>

        </section>

    </main>

</div>

<script src="citizen.js"></script>

</body>

</html>
