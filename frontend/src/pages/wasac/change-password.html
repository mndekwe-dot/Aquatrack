<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password | AquaTrack Rwanda</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="wasac.css">
    <script src="https://kit.fontawesome.com/8ddda2c5e4.js" crossorigin="anonymous"></script>
</head>
<body class="login-body">

<div class="staff-login-card">
    <div class="staff-login-logo">
        <i class="fa-solid fa-shield-halved"></i>
    </div>
    <h2>Set Your Password</h2>
    <p class="staff-login-sub">You must change your temporary password before continuing.</p>

    <div id="errorBox" class="error-box" style="display:none;"></div>

    <form id="changePasswordForm">
        <div class="form-group">
            <label>Current / Temporary Password</label>
            <input type="password" id="current_password" placeholder="Enter your temporary password" required>
        </div>
        <div class="form-group">
            <label>New Password</label>
            <input type="password" id="new_password" placeholder="Choose a strong password" minlength="6" required>
        </div>
        <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" id="confirm_password" placeholder="Confirm your new password" minlength="6" required>
        </div>
        <button type="submit" class="btn-primary" id="submitBtn">Set Password & Continue</button>
    </form>

    <p class="staff-login-security">🔒 Your password is encrypted and never stored in plain text.</p>
</div>

<script src="../../services/api.js"></script>
<script>
    const token = window.aquatrackApi.getToken();
    if (!token) { window.location.href = 'wasac-login.html'; }

    document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const errorBox = document.getElementById('errorBox');
        errorBox.style.display = 'none';

        const current_password = document.getElementById('current_password').value;
        const new_password = document.getElementById('new_password').value;
        const confirm_password = document.getElementById('confirm_password').value;

        if (new_password !== confirm_password) {
            errorBox.textContent = 'New passwords do not match.';
            errorBox.style.display = 'block';
            return;
        }
        if (new_password === current_password) {
            errorBox.textContent = 'New password must be different from your current password.';
            errorBox.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Saving...';

        try {
            await window.aquatrackApi.changeStaffPassword(current_password, new_password);
            alert('Password changed successfully! You will now be taken to the dashboard.');
            window.location.href = 'overview.html';
        } catch (err) {
            errorBox.textContent = err.message || 'Could not change password. Please try again.';
            errorBox.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Set Password & Continue';
        }
    });
</script>

</body>
</html>
