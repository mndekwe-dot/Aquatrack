<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Report Water Issue | AquaTrack Rwanda</title>

    <link rel="stylesheet" href="citizen.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://kit.fontawesome.com/8ddda2c5e4.js" crossorigin="anonymous"></script>
</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            <i class="fa-solid fa-droplet"></i>

            <div>

                <h2>AquaTrack</h2>

                <span>Citizen Portal</span>

            </div>

        </div>

        <ul>

            <li>

                <a href="citizen-dashboard.html">

                    <i class="fa-solid fa-house"></i>

                    Dashboard

                </a>

            </li>

            <li>

                <a href="citizen-history.html">

                    <i class="fa-solid fa-clock-rotate-left"></i>

                    History

                </a>

            </li>

            <li class="active">

                <a href="citizen-report.html">

                    <i class="fa-solid fa-file-circle-plus"></i>

                    Report Issue

                </a>

            </li>

            <li>

                <a href="citizen-profile.html">

                    <i class="fa-solid fa-user"></i>

                    Profile

                </a>

            </li>

            <li>

                <a href="index.html">

                    <i class="fa-solid fa-right-from-bracket"></i>

                    Logout

                </a>

            </li>

        </ul>

    </aside>

    <!-- Main Content -->

    <main class="content">

        <header class="topbar">

            <div>

                <h1>Report a Water Issue</h1>

                <p>Help WASAC respond quickly by reporting problems.</p>

            </div>

        </header>

        <section class="table-card">

            <form id="reportForm">

                <div class="input-group">

                    <label>Issue Type</label>

                    <div class="input-box">

                        <i class="fa-solid fa-list"></i>

                        <select required>

                            <option value="">Select an issue</option>

                            <option>Water Leak</option>

                            <option>Faulty Meter</option>

                            <option>Illegal Connection</option>

                            <option>No Water Supply</option>

                            <option>Pipe Burst</option>

                        </select>

                    </div>

                </div>

                <div class="input-group">

                    <label>Location</label>

                    <div class="input-box">

                        <i class="fa-solid fa-location-dot"></i>

                        <input
                            type="text"
                            placeholder="Enter location"
                            required>

                    </div>

                </div>

                <div class="input-group">

                    <label>Description</label>

                    <textarea
                        rows="6"
                        placeholder="Describe the issue..."
                        required></textarea>

                </div>

                <div class="input-group">

                    <label>Upload Image (Optional)</label>

                    <input
                        type="file"
                        accept="image/*">

                </div>

                <button
                    type="submit"
                    class="login-btn">

                    Submit Report

                </button>

            </form>

        </section>

    </main>

</div>

<script src="citizen.js"></script>

</body>

</html>
