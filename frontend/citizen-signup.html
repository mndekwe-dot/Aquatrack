<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Citizen Account | AquaTrack Rwanda</title>

    <link rel="stylesheet" href="auth.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://kit.fontawesome.com/8ddda2c5e4.js" crossorigin="anonymous"></script>

</head>

<body>

<div class="auth-page">

    <!-- LEFT PANEL -->

    <div class="auth-left">

        <div class="left-content">

            <a href="index.html" class="back-home">

                <i class="fa-solid fa-arrow-left"></i>

                Back to Home

            </a>

            <div class="logo">

                <div class="logo-icon">

                    <i class="fa-solid fa-droplet"></i>

                </div>

                <div>

                    <h2>AquaTrack</h2>

                    <span>Citizen Portal</span>

                </div>

            </div>

            <span class="tag">

                Join AquaTrack

            </span>

            <h1>

                Create Your Account

            </h1>

            <p>

                Register to monitor your water usage, receive alerts,
                and report water issues directly to WASAC.

            </p>

        </div>

    </div>

    <!-- RIGHT PANEL -->

    <div class="auth-right">

        <div class="login-card">

            <span class="small-title">

                AquaTrack Rwanda

            </span>

            <h2>

                Citizen Sign Up

            </h2>

            <p>

                Create your AquaTrack account below.

            </p>

            <form id="signupForm">

                <div class="input-group">

                    <label>Full Name</label>

                    <div class="input-box">

                        <i class="fa-solid fa-user"></i>

                        <input
                            type="text"
                            placeholder="Enter your full name"
                            required>

                    </div>

                </div>

                <div class="input-group">

                    <label>Email Address</label>

                    <div class="input-box">

                        <i class="fa-solid fa-envelope"></i>

                        <input
                            type="email"
                            placeholder="Enter your email"
                            required>

                    </div>

                </div>

                <div class="input-group">

                    <label>Phone Number</label>

                    <div class="input-box">

                        <i class="fa-solid fa-phone"></i>

                        <input
                            type="tel"
                            placeholder="+250 7XX XXX XXX"
                            required>

                    </div>

                </div>

                <div class="input-group">

                    <label>Password</label>

                    <div class="input-box">

                        <i class="fa-solid fa-lock"></i>

                        <input
                            type="password"
                            placeholder="Create a password"
                            required>

                    </div>

                </div>

                <button class="login-btn" type="submit">

                    Create Account

                </button>

            </form>

            <div class="signup-link">

                Already have an account?

                <a href="citizen-login.html">

                    Sign In

                </a>

            </div>

        </div>

    </div>

</div>

<script src="auth.js"></script>

</body>

</html>
